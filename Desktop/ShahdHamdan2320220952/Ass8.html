<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الآلة الحاسبة التفاعلية - جامعة الأقصى</title>
    <link rel="stylesheet" href="Ass8.css">
</head>
<body>

    <div class="calculator">
        <div id="display" class="display">0</div>
        
        <div class="buttons">
            <button onclick="clearDisplay()" class="btn-special">ج</button>
            <button onclick="deleteLast()" class="btn-special">⌫</button>
            <button onclick="appendToDisplay('%')" class="btn-operator">%</button>
            <button onclick="appendToDisplay('/')" class="btn-operator">÷</button>
            
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button onclick="appendToDisplay('*')" class="btn-operator">×</button>
            
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button onclick="appendToDisplay('-')" class="btn-operator">-</button>
            
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="appendToDisplay('+')" class="btn-operator">+</button>
            
            <button onclick="appendToDisplay('0')" class="zero">0</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button onclick="calculate()" class="btn-equal">=</button>
        </div>
    </div>

    <script src="Ass8.js"></script>
</body>
</html>

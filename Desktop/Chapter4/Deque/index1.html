<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نموذج التسجيل الكامل</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; margin: 20px; background-color: #f4f4f4; }
        form { background: #fff; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        div { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="password"], input[type="date"], select, textarea {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        .radio-group, .checkbox-group { display: flex; gap: 10px; align-items: center; }
        button { background: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

    <form action="#" method="post">
        <h2>إنشاء حساب جديد</h2>

        <div>
            <label for="fullname">الاسم الكامل:</label>
            <input type="text" id="fullname" name="fullname" required placeholder="أدخل اسمك الثلاثي">
        </div>

        <div>
            <label for="email">البريد الإلكتروني:</label>
            <input type="email" id="email" name="email" required placeholder="example@mail.com">
        </div>

        <div>
            <label for="password">كلمة المرور:</label>
            <input type="password" id="password" name="password" required minlength="8">
        </div>

        <div>
            <label for="dob">تاريخ الميلاد:</label>
            <input type="date" id="dob" name="dob" required>
        </div>

        <div>
            <label for="country">الدولة:</label>
            <select id="country" name="country" required>
                <option value="">اختر الدولة...</option>
                <option value="sa">السعودية</option>
                <option value="eg">مصر</option>
                <option value="ae">الإمارات</option>
                <option value="other">أخرى</option>
            </select>
        </div>

        <div>
            <label>الجنس:</label>
            <div class="radio-group">
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">ذكر</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">أنثى</label>
            </div>
        </div>

        <div>
            <label>الاهتمامات:</label>
            <div class="checkbox-group">
                <input type="checkbox" id="coding" name="interests" value="coding">
                <label for="coding">البرمجة</label>
                <input type="checkbox" id="design" name="interests" value="design">
                <label for="design">التصميم</label>
            </div>
        </div>

        <div>
            <label for="experience">مستوى الخبرة (0 - 10):</label>
            <input type="range" id="experience" name="experience" min="0" max="10" step="1">
        </div>

        <div>
            <label for="resume">رفع السيرة الذاتية (PDF):</label>
            <input type="file" id="resume" name="resume" accept=".pdf">
        </div>

        <div>
            <label for="bio">نبذة تعريفية:</label>
            <textarea id="bio" name="bio" rows="4" placeholder="تحدث عن نفسك..."></textarea>
        </div>

        <button type="submit">تسجيل الآن</button>
    </form>

</body>
</html>
